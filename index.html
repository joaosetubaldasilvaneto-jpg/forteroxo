<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forte Roxo Acai</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
padding:20px;
}

.container{
max-width:600px;
margin:auto;
}

h1{
text-align:center;
color:#9b4dff;
}

.card{
background:#1f1f1f;
padding:20px;
margin-top:15px;
border-radius:10px;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:8px;
background:#25D366;
color:white;
font-size:20px;
margin-top:15px;
cursor:pointer;
}

.menu button{
background:#9b4dff;
}

label{
display:flex;
align-items:center;
gap:10px;
padding:12px;
margin:6px 0;
background:#2a2a2a;
border-radius:8px;
font-size:18px;
cursor:pointer;
}

input[type="checkbox"], input[type="radio"]{
width:24px;
height:24px;
}

input[type=text]{
width:100%;
padding:12px;
border:none;
border-radius:6px;
margin-bottom:10px;
font-size:18px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Forte Roxo Acai</h1>

<div id="menuInicial" class="menu">

<h3>Escolha seu prato</h3>

<button onclick="abrirArroz()">Arroz Ensopado</button>
<button onclick="abrirMacarrao()">Macarrao</button>

</div>

<!-- ARROZ -->

<div id="arroz" class="hidden">

<input type="text" id="nomeArroz" placeholder="Seu nome">

<div class="card">

<h3>Tipo de atendimento</h3>

<label><input type="radio" name="tipoArroz" value="Comer no local"> Comer no local</label>
<label><input type="radio" name="tipoArroz" value="Delivery"> Delivery</label>
<label><input type="radio" name="tipoArroz" value="Retirada no balcao"> Retirada no balcao</label>

</div>

<div class="card">

<h3>Tamanho</h3>

<label><input type="radio" name="tamanhoArroz" value="Pequeno"> Pequeno</label>
<label><input type="radio" name="tamanhoArroz" value="Grande"> Grande</label>

</div>

<div class="card">

<h3>Refogar</h3>

<label><input type="checkbox" class="refogarArroz" value="Alho"> Alho</label>
<label><input type="checkbox" class="refogarArroz" value="Cebola"> Cebola</label>
<label><input type="checkbox" class="refogarArroz" value="Azeite"> Azeite</label>
<label><input type="checkbox" class="refogarArroz" value="Manteiga"> Manteiga</label>

</div>

<div class="card">

<h3>Proteina</h3>

<label><input type="checkbox" class="proteinaArroz" value="Frango"> Frango</label>
<label><input type="checkbox" class="proteinaArroz" value="File"> File</label>
<label><input type="checkbox" class="proteinaArroz" value="Camarao"> Camarao</label>
<label><input type="checkbox" class="proteinaArroz" value="Carneiro"> Carneiro</label>
<label><input type="checkbox" class="proteinaArroz" value="Calabresa"> Calabresa</label>

</div>

<div class="card">

<h3>Temperos (max 3)</h3>

<label><input type="checkbox" class="tempArroz" value="Azeitona"> Azeitona</label>
<label><input type="checkbox" class="tempArroz" value="Batata Palha"> Batata Palha</label>
<label><input type="checkbox" class="tempArroz" value="Cebola"> Cebola</label>
<label><input type="checkbox" class="tempArroz" value="Cheiro Verde"> Cheiro Verde</label>
<label><input type="checkbox" class="tempArroz" value="Ervilha"> Ervilha</label>
<label><input type="checkbox" class="tempArroz" value="Oregano"> Oregano</label>
<label><input type="checkbox" class="tempArroz" value="Pimenta Calabresa"> Pimenta Calabresa</label>
<label><input type="checkbox" class="tempArroz" value="Pimenta de Cheiro"> Pimenta de Cheiro</label>
<label><input type="checkbox" class="tempArroz" value="Pimenta do Reino"> Pimenta do Reino</label>
<label><input type="checkbox" class="tempArroz" value="Queijo Parmesao"> Queijo Parmesao</label>
<label><input type="checkbox" class="tempArroz" value="Tomate"> Tomate</label>
<label><input type="checkbox" class="tempArroz" value="Pimentao"> Pimentao</label>
<label><input type="checkbox" class="tempArroz" value="Milho"> Milho</label>
<label><input type="checkbox" class="tempArroz" value="Mussarela"> Mussarela</label>
<label><input type="checkbox" class="tempArroz" value="Presunto"> Presunto</label>
<label><input type="checkbox" class="tempArroz" value="Creme de Leite"> Creme de Leite</label>

</div>

<button onclick="enviarArroz()">Enviar Pedido</button>

</div>

<!-- MACARRAO -->

<div id="macarrao" class="hidden">

<input type="text" id="nomeMacarrao" placeholder="Seu nome">

<div class="card">

<h3>Tipo de atendimento</h3>

<label><input type="radio" name="tipoMac" value="Comer no local"> Comer no local</label>
<label><input type="radio" name="tipoMac" value="Delivery"> Delivery</label>
<label><input type="radio" name="tipoMac" value="Retirada no balcao"> Retirada no balcao</label>

</div>

<div class="card">

<h3>Tamanho</h3>

<label><input type="radio" name="tamanhoMac" value="Pequeno"> Pequeno</label>
<label><input type="radio" name="tamanhoMac" value="Grande"> Grande</label>

</div>

<div class="card">

<h3>Refogar a massa (max 3)</h3>

<label><input type="checkbox" class="refogarMac" value="Alho"> Alho</label>
<label><input type="checkbox" class="refogarMac" value="Cebola"> Cebola</label>
<label><input type="checkbox" class="refogarMac" value="Azeite"> Azeite</label>
<label><input type="checkbox" class="refogarMac" value="Manteiga"> Manteiga</label>

</div>

<div class="card">

<h3>Molho</h3>

<label><input type="checkbox" class="molhoMac" value="Branco"> Branco</label>
<label><input type="checkbox" class="molhoMac" value="Rose"> Rose</label>
<label><input type="checkbox" class="molhoMac" value="Vermelho"> Vermelho</label>

</div>

<div class="card">

<h3>Macarrao</h3>

<label><input type="checkbox" class="tipoMacarrao" value="Penne"> Penne</label>
<label><input type="checkbox" class="tipoMacarrao" value="Parafuso"> Parafuso</label>
<label><input type="checkbox" class="tipoMacarrao" value="Espaguete"> Espaguete</label>
<label><input type="checkbox" class="tipoMacarrao" value="Talharim"> Talharim</label>

</div>

<div class="card">

<h3>Ingredientes (max 3)</h3>

<label><input type="checkbox" class="ingredMac" value="Bacon"> Bacon</label>
<label><input type="checkbox" class="ingredMac" value="Calabresa"> Calabresa</label>
<label><input type="checkbox" class="ingredMac" value="Camarao"> Camarao</label>
<label><input type="checkbox" class="ingredMac" value="Carne de Sol"> Carne de Sol</label>
<label><input type="checkbox" class="ingredMac" value="Ovo de Codorna"> Ovo de Codorna</label>
<label><input type="checkbox" class="ingredMac" value="Ovo Cozido"> Ovo Cozido</label>
<label><input type="checkbox" class="ingredMac" value="Mussarela"> Mussarela</label>
<label><input type="checkbox" class="ingredMac" value="Carne Moida"> Carne Moida</label>
<label><input type="checkbox" class="ingredMac" value="Frango"> Frango</label>
<label><input type="checkbox" class="ingredMac" value="Salsicha"> Salsicha</label>
<label><input type="checkbox" class="ingredMac" value="Presunto"> Presunto</label>

</div>

<div class="card">

<h3>Temperos (max 3)</h3>

<label><input type="checkbox" class="tempMac" value="Azeitona"> Azeitona</label>
<label><input type="checkbox" class="tempMac" value="Batata Palha"> Batata Palha</label>
<label><input type="checkbox" class="tempMac" value="Cebola"> Cebola</label>
<label><input type="checkbox" class="tempMac" value="Cheiro Verde"> Cheiro Verde</label>
<label><input type="checkbox" class="tempMac" value="Ervilha"> Ervilha</label>
<label><input type="checkbox" class="tempMac" value="Oregano"> Oregano</label>
<label><input type="checkbox" class="tempMac" value="Pimenta Calabresa"> Pimenta Calabresa</label>
<label><input type="checkbox" class="tempMac" value="Pimenta de Cheiro"> Pimenta de Cheiro</label>
<label><input type="checkbox" class="tempMac" value="Pimenta do Reino"> Pimenta do Reino</label>
<label><input type="checkbox" class="tempMac" value="Queijo Parmesao"> Queijo Parmesao</label>
<label><input type="checkbox" class="tempMac" value="Tomate"> Tomate</label>
<label><input type="checkbox" class="tempMac" value="Pimentao"> Pimentao</label>
<label><input type="checkbox" class="tempMac" value="Palmito"> Palmito</label>
<label><input type="checkbox" class="tempMac" value="Milho"> Milho</label>

</div>

<button onclick="enviarMacarrao()">Enviar Pedido</button>

</div>

</div>

<script>

function abrirArroz(){
document.getElementById("menuInicial").style.display="none"
document.getElementById("arroz").style.display="block"
}

function abrirMacarrao(){
document.getElementById("menuInicial").style.display="none"
document.getElementById("macarrao").style.display="block"
}

function pegarSelecionados(classe){
let itens=[]
document.querySelectorAll("."+classe+":checked").forEach(i=>{
itens.push(i.value)
})
return itens
}

function listaTexto(lista){
if(lista.length===0) return ""
let txt=""
lista.forEach(i=>{
txt+="- "+i+"\n"
})
return txt
}

function enviarArroz(){

let nome=document.getElementById("nomeArroz").value || "Nao informado"
let tipo=document.querySelector('input[name="tipoArroz"]:checked')
let tamanho=document.querySelector('input[name="tamanhoArroz"]:checked')

let refogar=pegarSelecionados("refogarArroz")
let proteina=pegarSelecionados("proteinaArroz")
let temperos=pegarSelecionados("tempArroz")

let mensagem="Pedido - Forte Roxo Acai\n\n"

mensagem+="Nome: "+nome+"\n\n"
mensagem+="Atendimento: "+(tipo?tipo.value:"")+"\n"
mensagem+="Tamanho: "+(tamanho?tamanho.value:"")+"\n\n"

mensagem+="Prato: Arroz Ensopado\n\n"

mensagem+="Refogar:\n"+listaTexto(refogar)+"\n"
mensagem+="Proteina:\n"+listaTexto(proteina)+"\n"
mensagem+="Temperos:\n"+listaTexto(temperos)

window.open("https://wa.me/5599981024748?text="+encodeURIComponent(mensagem))

}

function enviarMacarrao(){

let nome=document.getElementById("nomeMacarrao").value || "Nao informado"
let tipo=document.querySelector('input[name="tipoMac"]:checked')
let tamanho=document.querySelector('input[name="tamanhoMac"]:checked')

let refogar=pegarSelecionados("refogarMac")
let molho=pegarSelecionados("molhoMac")
let macarrao=pegarSelecionados("tipoMacarrao")
let ingredientes=pegarSelecionados("ingredMac")
let temperos=pegarSelecionados("tempMac")

let mensagem="Pedido - Forte Roxo Acai\n\n"

mensagem+="Nome: "+nome+"\n\n"
mensagem+="Atendimento: "+(tipo?tipo.value:"")+"\n"
mensagem+="Tamanho: "+(tamanho?tamanho.value:"")+"\n\n"

mensagem+="Prato: Macarrao\n\n"

mensagem+="Refogar:\n"+listaTexto(refogar)+"\n"
mensagem+="Molho:\n"+listaTexto(molho)+"\n"
mensagem+="Macarrao:\n"+listaTexto(macarrao)+"\n"
mensagem+="Ingredientes:\n"+listaTexto(ingredientes)+"\n"
mensagem+="Temperos:\n"+listaTexto(temperos)

window.open("https://wa.me/5599981024748?text="+encodeURIComponent(mensagem))

}

</script>

</body>
</html>
