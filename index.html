<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forte Roxo Açaí - Pedidos</title>
    <style>
        :root {
            --primary: #9b4dff;
            --secondary: #25D366;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
            --text-light: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--primary);
            padding-bottom: 10px;
        }

        h3 { color: var(--primary); margin-bottom: 15px; }

        .card {
            background: var(--card-bg);
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
            margin-top: 10px;
        }

        button:active { transform: scale(0.98); }

        .btn-send { background: var(--secondary); color: white; margin-top: 25px; }
        .btn-menu { background: var(--primary); color: white; }
        .btn-back { background: transparent; color: #888; border: 1px solid #444; font-size: 14px; margin-bottom: 20px; }

        label {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px;
            margin: 8px 0;
            background: #2a2a2a;
            border-radius: 8px;
            transition: background 0.3s;
            cursor: pointer;
        }

        label:hover { background: #333; }

        input[type="checkbox"], input[type="radio"] {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        input[type=text] {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 8px;
            background: #1a1a1a;
            color: white;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        input[type=text]:focus { border-color: var(--primary); outline: none; }

        .hidden { display: none; }
        
        .limit-info { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h1>Forte Roxo Açaí</h1>

    <div id="menuInicial">
        <div class="card" style="text-align: center;">
            <h3>O que vamos pedir hoje?</h3>
            <button class="btn-menu" onclick="showPage('arroz')">Arroz Ensopado</button>
            <button class="btn-menu" onclick="showPage('macarrao')">Macarrão</button>
        </div>
    </div>

    <div id="arroz" class="hidden">
        <button class="btn-back" onclick="showPage('menuInicial')">← Voltar ao Menu</button>
        <input type="text" id="nomeArroz" placeholder="Digite seu nome">

        <div class="card">
            <h3>Tipo de Atendimento</h3>
            <label><input type="radio" name="tipoArroz" value="Comer no local"> Comer no local</label>
            <label><input type="radio" name="tipoArroz" value="Delivery"> Delivery</label>
            <label><input type="radio" name="tipoArroz" value="Retirada"> Retirada</label>
        </div>

        <div class="card">
            <h3>Temperos</h3>
            <span class="limit-info">(Selecione no máximo 3)</span>
            <div class="checkbox-group" data-limit="3">
                <label><input type="checkbox" class="tempArroz" value="Azeitona"> Azeitona</label>
                <label><input type="checkbox" class="tempArroz" value="Batata Palha"> Batata Palha</label>
                <label><input type="checkbox" class="tempArroz" value="Queijo Parmesão"> Queijo Parmesão</label>
                <label><input type="checkbox" class="tempArroz" value="Milho"> Milho</label>
                </div>
        </div>

        <button class="btn-send" onclick="enviarPedido('arroz')">Enviar via WhatsApp</button>
    </div>

    <div id="macarrao" class="hidden">
        <button class="btn-back" onclick="showPage('menuInicial')">← Voltar ao Menu</button>
        <input type="text" id="nomeMacarrao" placeholder="Digite seu nome">
        
        <div class="card">
            <h3>Tipo de Macarrão</h3>
            <label><input type="radio" name="tipoMacarrao" value="Penne"> Penne</label>
            <label><input type="radio" name="tipoMacarrao" value="Espaguete"> Espaguete</label>
        </div>

        <button class="btn-send" onclick="enviarPedido('macarrao')">Enviar via WhatsApp</button>
    </div>
</div>

<script>
    // Navegação simples entre seções
    function showPage(id) {
        document.getElementById("menuInicial").classList.add("hidden");
        document.getElementById("arroz").classList.add("hidden");
        document.getElementById("macarrao").classList.add("hidden");
        document.getElementById(id).classList.remove("hidden");
        window.scrollTo(0, 0);
    }

    // Controle de Limite de Checkbox (Ex: máx 3 temperos)
    document.querySelectorAll('.checkbox-group').forEach(group => {
        const limit = parseInt(group.getAttribute('data-limit'));
        const checkboxes = group.querySelectorAll('input[type="checkbox"]');
        
        checkboxes.forEach(checkbox => {
            checkbox.addEventListener('change', () => {
                const checkedCount = group.querySelectorAll('input:checked').length;
                if (checkedCount > limit) {
                    checkbox.checked = false;
                    alert(`Você pode escolher no máximo ${limit} itens nesta seção.`);
                }
            });
        });
    });

    function enviarPedido(tipoPrato) {
        let nome = document.getElementById(tipoPrato === 'arroz' ? "nomeArroz" : "nomeMacarrao").value.trim();
        if(!nome) return alert("Por favor, digite seu nome.");

        // Lógica de coleta de dados simplificada (similar à sua)
        // ... (Aqui você mantém sua lógica de pegar selecionados)
        
        let msg = `*Pedido - Forte Roxo Açaí*\n\n*Cliente:* ${nome}\n*Prato:* ${tipoPrato.toUpperCase()}`;
        
        // Formata link e abre
        let fone = "5599981024748";
        window.open(`https://wa.me/${fone}?text=${encodeURIComponent(msg)}`);
    }
</script>

</body>
</html>
